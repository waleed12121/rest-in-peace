        body {
            background-color: black;

            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 50px;
        }

        /* تنسيق صورة إيتاشي مع الإطار */
        .profile-img {
            border: 2px solid #555;

        }

        /* نافذة التيرمينال السفلى */
        .terminal-box {
            border: 1px solid #333;
            border-radius: 10px;
            background-color: rgba(10, 10, 10, 0.9);
            width: 600px;
            max-width: 95%;
            padding: 20px;
            text-align: left;
            direction: ltr; /* لجعل علامات النظام تظهر بشكل صحيح */

        .terminal-header {
            color: #666;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .terminal-prompt {
            color: #bbb;
            margin-bottom: 10px;
        }

        .terminal-prompt span {
            color: #888;
        }

        /* نص الرسالة باللون الأخضر */
        .message-content {
            color: #00ff41; /* أخضر التيرمينال */
            text-align: right;
            direction: rtl;
            line-height: 1.6;
            font-size: 16px;
        }

        /* مشغل الصوت المخفي */

        }
